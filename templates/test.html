<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
    <title>{{ test.title }}</title>
</head>
<body>
    <div class="card">
        <h2>{{ test.title }}</h2>
        <p><strong>Вопрос:</strong> {{ question.text }}</p>

        <div class="answers">
            {% for answer in question.answers %}
            <button onclick="submitAnswer('{{ answer.scale }}', {{ answer.score | default(0) }})">
                {{ answer.text }}
            </button>
            {% endfor %}
        </div>

        {% if can_go_back %}
        <button onclick="history.back()" class="btn-secondary">← Назад</button>
        {% endif %}
    </div>

    <script>
    function submitAnswer(scale, scoreValue) {
        const urlParams = new URLSearchParams(window.location.search);
        let scores = JSON.parse(decodeURIComponent(urlParams.get('scores_json') || '{}'));
        
        // Считаем баллы
        scores[scale] = (scores[scale] || 0) + scoreValue;
        
        const nextIndex = parseInt(urlParams.get('q_index') || 0) + 1;
        const username = urlParams.get('username');
        const scoresStr = encodeURIComponent(JSON.stringify(scores));
        
        window.location.href = `/test/{{ test.id }}?username=${username}&q_index=${nextIndex}&scores_json=${scoresStr}`;
    }
    </script>
</body>
</html>
