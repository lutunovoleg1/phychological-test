<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
    <title>{{ test.title }}</title>
</head>
<body>
    <div class="card">
        <h2>{{ test.title }}</h2>
        <p class="progress">Вопрос {{ question_number }} из {{ questions_count }}</p>
        <p><strong>Вопрос:</strong> {{ question.text }}</p>

        <div class="answers">
            {% for answer in question.answer_options %}
            <form action="/test/{{ test.id }}/answer" method="post">
                <input type="hidden" name="session_id" value="{{ session_id }}">
                <input type="hidden" name="answer_code" value="{{ answer.code }}">
                <button type="submit">{{ answer.text }}</button>
            </form>
            {% endfor %}
        </div>

        {% if can_go_back %}
        <form action="/test/{{ test.id }}/back" method="post">
            <input type="hidden" name="session_id" value="{{ session_id }}">
            <button type="submit" class="btn-secondary">← Назад</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
